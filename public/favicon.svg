<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="32" fill="#16a34a"/>

  <!-- Fridge body -->
  <rect x="16" y="8" width="32" height="48" rx="4" fill="white"/>

  <!-- Divider line between freezer and fridge -->
  <line x1="16" y1="26" x2="48" y2="26" stroke="#16a34a" stroke-width="2"/>

  <!-- Freezer handle — right side -->
  <rect x="36" y="13" width="8" height="2.5" rx="1.25" fill="#16a34a"/>

  <!-- Fridge handle — right side -->
  <rect x="36" y="32" width="8" height="2.5" rx="1.25" fill="#16a34a"/>
</svg>
